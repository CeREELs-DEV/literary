<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Literary Imagination Demo</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="app">
      <section id="start-screen" class="screen">
        <h1>Literary Imagination Demo</h1>
        <button id="start-sample" type="button">📖 Open the sample book</button>
        <p id="upload-status" class="upload-status" role="status"></p>
      </section>
      <section id="experience-screen" class="screen hidden">
        <div id="stage" class="hidden">
          <div id="media-frame">
            <div id="clip-layer"></div>
            <div id="image-layer"></div>
            <div id="flash-layer"></div>
          </div>
          <div id="text-layer">
            <p id="beat-text"></p>
            <p id="beat-caption"></p>
          </div>
        </div>
        <p id="experience-status" class="upload-status" role="status"></p>
        <div id="book" class="hidden">
          <h2 id="book-title"></h2>
          <div id="book-pages"></div>
        </div>
        <div id="passage-viewer" class="hidden">
          <div id="version-tabs"></div>
          <div id="viewer-card" class="remix-card"></div>
        </div>
        <div id="imagine-panel" class="hidden">
          <input id="era-input" type="text"
            placeholder="e.g. I want to imagine this in 1800s Joseon Korea" />
          <button id="imagine-btn" type="button">✨ Imagine</button>
          <p id="imagine-status" class="upload-status" role="status"></p>
        </div>
      </section>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
