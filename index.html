<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Imagination Player</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="app">
      <header id="lab-header">
        <h1>Curated Imagination Player</h1>
      </header>

      <!-- Reading first: the passage, undisturbed. No prompts, no generation,
           no literary terms — just the text and, at its end, one button. -->
      <main id="reader">
        <article id="passage-page">
          <h3 id="passage-book"></h3>
          <p id="passage-text"></p>
        </article>

        <div id="after-passage">
          <button id="open-player-btn" type="button">✨ See the imagined scenes</button>
          <p class="hint">Three short films — the same paragraph, three different eyes.</p>
        </div>
      </main>

      <!-- Imagination Player: pre-produced videos only. Students watch,
           observe, and compare; nothing here generates anything. -->
      <div id="player-overlay" class="hidden">
        <div id="player-sheet" role="dialog" aria-modal="true">
          <header id="sheet-header">
            <h2>The same paragraph, three ways</h2>
            <button id="close-player-btn" type="button">Back to reading</button>
          </header>

          <div id="viewpoint-tabs"></div>

          <section id="scene-card">
            <div id="scene-media"></div>
            <p id="scene-interpretation"></p>
            <div id="scene-anchors"></div>
            <div id="scene-questions"></div>
          </section>

          <section id="compare-block">
            <h4>Now compare the three</h4>
            <ol id="compare-questions"></ol>
          </section>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
