<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Literary Imagination Demo</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="app">
      <section id="start-screen" class="screen">
        <h1>Literary Imagination Demo</h1>
        <button id="start-sample" type="button">Start Sample Experience</button>
        <div class="upload-block">
          <label for="book-photo" class="upload-label">or use your own book</label>
          <input id="book-photo" type="file" accept="image/jpeg,image/png,image/webp" />
          <p id="upload-status" class="upload-status" role="status"></p>
          <div id="artifact-strip" class="artifact-strip"></div>
        </div>
      </section>
      <section id="experience-screen" class="screen hidden">
        <div id="stage" class="hidden">
          <div id="media-frame">
            <div id="clip-layer"></div>
            <div id="image-layer"></div>
            <div id="flash-layer"></div>
          </div>
          <div id="text-layer">
            <p id="beat-text"></p>
            <p id="beat-caption"></p>
          </div>
        </div>
        <p id="experience-status" class="upload-status" role="status"></p>
        <div id="book" class="hidden">
          <h2 id="book-title"></h2>
          <div id="book-pages"></div>
        </div>
        <div id="imagine-panel" class="hidden">
          <p id="selected-passage"></p>
          <div id="era-chips">
            <button type="button" class="era-chip">Joseon Korea</button>
            <button type="button" class="era-chip">Medieval Europe</button>
            <button type="button" class="era-chip">1990s city streets</button>
            <button type="button" class="era-chip">A far-future space colony</button>
          </div>
          <input id="era-input" type="text"
            placeholder="e.g. I want to imagine this in 1800s Joseon Korea" />
          <button id="imagine-btn" type="button">✨ Imagine</button>
          <p id="imagine-status" class="upload-status" role="status"></p>
        </div>
        <div id="remix-gallery"></div>
      </section>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
