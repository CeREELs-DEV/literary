<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Literary Imagination Demo</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="app">
      <section id="start-screen" class="screen">
        <h1>Literary Imagination Demo</h1>
        <button id="start-sample" type="button">Start Sample Experience</button>
        <div class="upload-block">
          <label for="book-photo" class="upload-label">or use your own book</label>
          <input id="book-photo" type="file" accept="image/jpeg,image/png,image/webp" />
          <p id="upload-status" class="upload-status" role="status"></p>
          <div id="artifact-strip" class="artifact-strip"></div>
        </div>
      </section>
      <section id="experience-screen" class="screen hidden">
        <div id="stage">
          <div id="media-frame">
            <div id="clip-layer"></div>
            <div id="image-layer"></div>
            <div id="flash-layer"></div>
          </div>
          <div id="text-layer">
            <p id="beat-text"></p>
            <p id="beat-caption"></p>
          </div>
        </div>
        <p id="experience-status" class="upload-status" role="status"></p>
        <button id="watch-film" type="button" class="replay-clip hidden">
          🎬 Watch the three imaginings
        </button>
      </section>
    </div>
    <div id="cinema" class="hidden">
      <video id="film-video" playsinline></video>
      <img id="film-image" class="hidden" alt="An imagining of the key scene" />
      <p id="imagining-label"></p>
      <div id="film-subtitle-bar"><p id="film-subtitle"></p></div>
      <div id="question-card" class="hidden">
        <h2>How did YOU imagine it?</h2>
        <p>Close your eyes and picture your own version of this moment.</p>
        <button id="cinema-replay" type="button">↺ Watch the imaginings again</button>
      </div>
      <button id="cinema-close" type="button" aria-label="Close">✕</button>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
